<!DOCTYPE html>
<script>
  const gamepads = navigator.getGamepads();
  if (gamepads[0]) {
    const gamepad = gamepads[0];
    
    if (gamepad.vibrationActuator) {
      gamepad.vibrationActuator.playEffect("dual-rumble", {
        startDelay: 0,
        duration: 200,
        weakMagnitude: 1.0,
        strongMagnitude: 0.5 
      });
    }
  }
</script>
